<svg
  width="400"
  height="400"
  viewBox="0 0 400 400"
  xmlns="http://www.w3.org/2000/svg"
>

  <!-- Background -->
  <rect width="400" height="400" fill="#EAF6FF"/>

  <!-- Beaker -->
  <rect
    x="70"
    y="40"
    width="260"
    height="300"
    rx="30"
    fill="none"
    stroke="#4A90E2"
    stroke-width="6"
  />

  <!-- Water -->
  <g>
    <rect x="80" y="150" width="240" height="180" fill="#4FC3F7">
      <animate
        attributeName="y"
        values="150;145;150"
        dur="4s"
        repeatCount="indefinite"
      />
    </rect>

    <!-- Water surface wave -->
    <path
      d="M80 150 Q140 145 200 150 T320 150"
      fill="#81D4FA"
    >
      <animate
        attributeName="d"
        values="
          M80 150 Q140 145 200 150 T320 150;
          M80 150 Q140 155 200 150 T320 150;
          M80 150 Q140 145 200 150 T320 150
        "
        dur="4s"
        repeatCount="indefinite"
      />
    </path>
  </g>

  <!-- Floating Molecule 1 -->
  <g>
    <circle cx="160" cy="240" r="14" fill="#1976D2"/>
    <circle cx="145" cy="250" r="8" fill="#BBDEFB"/>
    <circle cx="175" cy="250" r="8" fill="#BBDEFB"/>

    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; 0 -25; 0 0"
      dur="5s"
      repeatCount="indefinite"
    />
  </g>

  <!-- Floating Molecule 2 -->
  <g>
    <circle cx="250" cy="280" r="14" fill="#1976D2"/>
    <circle cx="235" cy="290" r="8" fill="#BBDEFB"/>
    <circle cx="265" cy="290" r="8" fill="#BBDEFB"/>

    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; 0 -30; 0 0"
      dur="6s"
      repeatCount="indefinite"
    />
  </g>

  <!-- Floating Molecule 3 -->
  <g>
    <circle cx="200" cy="260" r="14" fill="#1976D2"/>
    <circle cx="185" cy="270" r="8" fill="#BBDEFB"/>
    <circle cx="215" cy="270" r="8" fill="#BBDEFB"/>

    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; 0 -28; 0 0"
      dur="5.5s"
      repeatCount="indefinite"
    />
  </g>


  <!-- Bubbles -->
  <g fill="#B3E5FC" opacity="0.7">
    <circle cx="120" cy="300" r="4">
      <animate
        attributeName="cy"
        values="300;170"
        dur="3s"
        repeatCount="indefinite"
      />
      <animate
        attributeName="opacity"
        values="0;1;0"
        dur="3s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cx="280" cy="310" r="5">
      <animate
        attributeName="cy"
        values="310;180"
        dur="3.5s"
        repeatCount="indefinite"
      />
      <animate
        attributeName="opacity"
        values="0;1;0"
        dur="3.5s"
        repeatCount="indefinite"
      />
    </circle>
  </g>

</svg>
